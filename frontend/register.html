<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Register – STT</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
      .card { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); width: 100%; max-width: 360px; }
      h2 { margin: 0 0 24px; font-size: 20px; }
      label { display: block; font-size: 13px; margin-bottom: 4px; color: #444; }
      input { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 16px; }
      button { width: 100%; padding: 10px; font-size: 14px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background: #1558b0; }
      .err { color: #c00; font-size: 13px; margin-bottom: 12px; display: none; }
      .foot { text-align: center; font-size: 13px; margin-top: 16px; }
      a { color: #1a73e8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Create account</h2>
      <div class="err" id="err"></div>
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" />
      <label>Password</label>
      <input type="password" id="password" autocomplete="new-password" />
      <label>Confirm password</label>
      <input type="password" id="password2" autocomplete="new-password" />
      <button id="btn">Register</button>
      <div class="foot">Have an account? <a href="/login">Sign in</a></div>
    </div>

    <script>
      document.getElementById("btn").addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;
        const errEl = document.getElementById("err");
        errEl.style.display = "none";

        if (password !== password2) {
          errEl.textContent = "Passwords do not match";
          errEl.style.display = "block";
          return;
        }

        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        if (res.ok) {
          window.location.href = "/app";
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || "Registration failed";
          errEl.style.display = "block";
        }
      });
    </script>
  </body>
</html>
