{% extends "base.html" %}
{% block title %}Audit Logs{% endblock %}

{% block content %}
<h2>Audit Logs</h2>

<table>
<thead>
<tr>
<th>Date</th>
<th>User</th>
<th>Action</th>
<th>Details</th>
</tr>
</thead>

<tbody>
{% for log in logs %}
<tr>
<td>{{ log.created_at }}</td>
<td>{{ log.user_email }}</td>
<td>{{ log.action }}</td>
<td>{{ log.details }}</td>
</tr>
{% endfor %}
</tbody>

</table>
{% endblock %}
